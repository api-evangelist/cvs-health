apis:
  - aid: cvs-health:partner-integrations
    name: CVS Health Partner Integrations
    description: >-
      CVS Health does not publish a unified public REST API or developer
      portal. Pharmacy, PBM, and Aetna integrations are conducted via
      contracted partner channels using industry-standard rails such as
      NCPDP SCRIPT for e-prescribing, NCPDP Telecom for claims, X12 EDI
      for healthcare transactions, and HL7 / FHIR endpoints required
      for CMS Interoperability and Patient Access compliance. This
      entry catalogs the public corporate, digital health, and
      regulatory references useful for partner onboarding research.
