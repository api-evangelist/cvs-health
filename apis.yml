aid: cvs-health
name: CVS Health
kind: company
description: >-
  CVS Health is a Fortune 50 healthcare services and retail pharmacy
  company. Its core operating units include CVS Pharmacy (retail
  pharmacy and mail-order), CVS Caremark (pharmacy benefit management /
  PBM), Aetna (health insurance, Medicare, Medicaid, dental and vision),
  MinuteClinic (walk-in clinics), Oak Street Health (primary care for
  Medicare patients), and Signify Health (in-home health evaluations).
  CVS Health does not currently operate a public developer portal or
  generally available REST API. Programmatic integrations with CVS
  Pharmacy, Caremark, and Aetna are typically established through
  business partnership agreements, EDI / NCPDP pharmacy networks, and
  HIPAA-aligned interoperability channels (e.g., FHIR endpoints exposed
  to qualifying healthcare partners under regulatory mandates such as
  the CMS Interoperability Rule). Developer-facing artifacts in this
  index are limited to public marketing, corporate, and digital health
  references.
