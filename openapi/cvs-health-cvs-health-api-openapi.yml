openapi: 3.1.0
info:
  title: CVS Health API
  description: >-
    CVS Health provides APIs for pharmacy services, prescription management, and health data interoperability. These APIs enable healthcare providers and partners to integrate with CVS pharmacy and health services.
  version: '1.0'
  contact:
    name: CVS Health Developer Support
    url: https://www.cvshealth.com/social-responsibility/digital-health
externalDocs:
  description: Documentation
  url: https://www.cvshealth.com/social-responsibility/digital-health
servers:
  - url: https://api.cvshealth.com
    description: Production
tags:
  - name: Healthcare
    description: Healthcare operations
security:
  - bearerAuth: []
paths:
  /status:
    get:
      operationId: getStatus
      summary: Get API status
      description: >-
        Returns the current status of the API.
      tags:
        - Healthcare
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  version:
                    type: string
        '401':
          description: Unauthorized
        '429':
          description: Too many requests
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
